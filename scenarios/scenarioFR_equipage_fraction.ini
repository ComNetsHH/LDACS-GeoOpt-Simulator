[General]
description = "French airspace equipage-fraction scenario"
sim-time-limit = 1800s
repeat = 100

**.aircraft[*].app[*].packetSent:count.scalar-recording = true
**.aircraft[*].app[*].packetSent:sum(packetBytes).scalar-recording = true
**.aircraft[*].routingApp.helloSent:count.scalar-recording = true
**.aircraft[*].routingApp.rerrSent:count.scalar-recording = true
**.aircraft[*].routingApp.rreqSent:count.scalar-recording = true
**.aircraft[*].routingApp.rrepSent:count.scalar-recording = true
**.aircraft[*].routingApp.rrepAckSent:count.scalar-recording = true
**.aircraft[*].routingApp.aodvCtrlSent:count.scalar-recording = true
**.aircraft[*].routing.beaconSentCount:count.scalar-recording = true
**.aircraft[*].routing.beaconSentBytes:sum.scalar-recording = true
**.groundStation[*].app[*].packetReceived:count.scalar-recording = true
**.aircraft[*].ipv4.ip.packetDropHopLimitReached:count.scalar-recording = true
**.groundStation[*].app[*].endToEndDelay:vector.vector-recording = true
**.aircraft[*].routingApp.hopCount:vector.vector-recording = true
**.aircraft[*].routing.hopCount:vector.vector-recording = true
**.aircraft[*].routing.greedyForwardingFailed:vector.vector-recording = true
**.aircraft[*].routing.routingFailed:vector.vector-recording = true
**.aircraft[*].wlan[*].mac.queue.queueLength:vector.vector-recording = true
**.aircraft[*].wlan[*].mac.queue.queueingTime:vector.vector-recording = true
**.aircraft[*].wlan[*].mac.queueP2P.queueLength:vector.vector-recording = true
**.aircraft[*].wlan[*].mac.queueP2P.queueingTime:vector.vector-recording = true
**.aircraft[*].wlan[*].mac.macDelaySH:vector.vector-recording = true
**.aircraft[*].wlan[*].mac.macDelayP2P:vector.vector-recording = true

**.vector-recording = false
**.scalar-recording = false
**.statistic-recording = true

*.numGroundStations = 1

**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxX = 1250km
**.mobility.constraintAreaMaxY = 800km
**.mobility.constraintAreaMaxZ = 11km

**.groundStation[*].mobility.typename = "StationaryMobility"
**.groundStation[*].mobility.initFromDisplayString = false
**.groundStation[*].mobility.initialX = 1150km
**.groundStation[*].mobility.initialY = 400km
**.groundStation[*].mobility.initialZ = 0m

**.aircraft[*].mobility.typename = "LinearMobility"
**.aircraft[*].mobility.speed = 0.222kmps
**.aircraft[*].mobility.angle = uniform(0deg, 360deg)

*.numAircrafts = ${numAircrafts = 50, 100, 150, 200, 250, 300, 350, 400, 450, 500}

**.hasStatus = true
**.ipv4.arp.typename = "GlobalArp"
**.netmaskRoutes = ""
*.configurator.addStaticRoutes = false
**.configurator.typename = "HostAutoConfigurator"

[Config scenario]
network = scenarioFR_forwarding

output-vector-file = "${resultdir}/simresults/scenarioFR/EquipageFraction/${configname}/${iterationvarsf}#${repetition}.vec"
output-scalar-file = "${resultdir}/simresults/scenarioFR/EquipageFraction/${configname}/${iterationvarsf}#${repetition}.sca"
cmdenv-output-file = "${resultdir}/simresults/scenarioFR/EquipageFraction/${configname}/${iterationvarsf}#${repetition}.log"

**.communicationRange = 100km
**.groundStationRange = 370.4km
**.wlan[0].radio.receiver.ignoreInterference = true
**.wlan[*].radio.transmitter.interferenceRange = 0m
**.wlan[*].radio.transmitter.detectionRange = 370.4km

**.wlan[*].typename = "TdmaInterface"
**.slotDuration = 24ms
**.scheduler.maxP2PLinks = 50
**.buildGraphIntervalSlots = 10
**.wlan[*].mac.headerLength = 23B
**.wlan[*].mac.useAck = false
**.wlan[*].mac.queue.packetCapacity = 100
**.wlan[*].bitrate = 150kbps
**.maxTransmissionDuration = 24ms
**.dutyCycle = 0.1
**.errorRateSH = 0.1

*.aircraft[*].numApps = 1
*.aircraft[*].app[0].typename = "UdpTraceBasedApp"
*.aircraft[*].app[0].useTraces = false
*.aircraft[*].app[0].destAddresses = "groundStation[0]"
*.aircraft[*].app[0].destPort = 5000
*.aircraft[*].app[0].messageLength = 34B
*.aircraft[*].app[0].sendInterval = 60s
*.aircraft[*].app[0].packetName = "Udp_Aircraft" + string(parentIndex()) + ""
*.aircraft[*].app[0].startTime = uniform(10s, 30s)
*.aircraft[*].app[0].stopTime = 1800s

*.groundStation[0].numApps = 1
*.groundStation[0].app[0].typename = "UdpTraceBasedSink"
*.groundStation[0].app[0].localPort = 5000
*.groundStation[0].app[0].maxE2EDelay = 60s

**.startRecordingTime = 60s
**.stopRecordingTime = 1720s
**.timeToLive = 32

**.configurator.typename = "HostAutoConfigurator"
*.aircraft[*].numEthInterfaces = 1
*.aircraft[*].*.configurator.interfaces = "wlan0 eth0"
*.groundStation[*].*.configurator.interfaces = "eth0"

[Config routing]
extends = scenario
*.aircraft[*].routing.typename = "Greedy"
*.aircraft[*].routing.beaconInterval = 5s
*.aircraft[*].routing.groundstationsTraceFile = "../scenarioFR_groundstationsA2G.txt"
*.aircraft[*].routing.beaconForwardedFromGpsr = true
*.aircraft[*].routing.calculateForwardingRadiusReduction = true
*.aircraft[*].routing.averageSpeed = 0.222kmps

[Config dijkstra]
extends = routing
**.routing.typename = "Dspr"
**.routing.outputInterface = "wlan0"
**.routing.a2gOutputInterface = "eth0"

*.nodeManager.destAddrs = "groundStation[0]"
*.nodeManager.routeUpdateInterval = 0.5s
*.nodeManager.usableCommunicationRangeRatio = 0.99112

[Config greedy-forwarding-1hop]
extends = routing
*.aircraft[*].routing.useFFT = false
*.aircraft[*].routing.useTwoHopGreedy = false
*.aircraft[*].routing.useRandom = false

[Config gpsr-forwarding]
extends = routing
*.aircraft[*].routing.typename = "GpsrModified"


[Config optimized-greedy]
extends = routing
*.aircraft[*].routing.typename = "OptimizedGeographicGreedyRouting"
*.aircraft[*].routing.useEFFT = true
*.aircraft[*].routing.useEnforceEFFT = false
*.aircraft[*].routing.numberOfSelectedNeighbors = 8
*.aircraft[*].routing.distanceBetweennessWeightingFactor = 3
*.aircraft[*].routing.enableLoadBalancing = false